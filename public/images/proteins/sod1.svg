<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- SOD1: two connected lobes suggesting dimer with beta barrel -->
  <defs>
    <radialGradient id="sod1-g1" cx="0.4" cy="0.4">
      <stop offset="0%" stop-color="#8B7B65" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6B5B45" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="sod1-g2" cx="0.6" cy="0.6">
      <stop offset="0%" stop-color="#7B6B55" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5B4B35" stop-opacity="0.3"/>
    </radialGradient>
  </defs>
  <g transform="translate(60,60)">
    <!-- Dimer: two overlapping barrel shapes -->
    <ellipse cx="-14" cy="-6" rx="24" ry="28" fill="url(#sod1-g1)" opacity="0.7"/>
    <ellipse cx="14" cy="6" rx="24" ry="28" fill="url(#sod1-g2)" opacity="0.7"/>
    <!-- Beta strands suggesting barrel -->
    <path d="M-28,-16 Q-14,-20 -2,-10" stroke="#6B5B45" stroke-width="1.5" opacity="0.3"/>
    <path d="M-30,-4 Q-16,-8 -4,2" stroke="#6B5B45" stroke-width="1.5" opacity="0.3"/>
    <path d="M-28,8 Q-14,4 -2,14" stroke="#6B5B45" stroke-width="1.5" opacity="0.3"/>
    <path d="M4,-14 Q16,-18 28,-8" stroke="#5B4B35" stroke-width="1.5" opacity="0.3"/>
    <path d="M2,-2 Q14,-6 26,4" stroke="#5B4B35" stroke-width="1.5" opacity="0.3"/>
    <path d="M4,10 Q16,6 28,16" stroke="#5B4B35" stroke-width="1.5" opacity="0.3"/>
    <!-- Metal binding sites (Cu/Zn) -->
    <circle cx="-10" cy="-2" r="2.5" fill="#92400E" opacity="0.5"/>
    <circle cx="10" cy="2" r="2.5" fill="#92400E" opacity="0.5"/>
  </g>
</svg>
