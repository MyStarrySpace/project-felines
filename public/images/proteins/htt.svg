<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Huntingtin: large irregular HEAT-repeat solenoid shape -->
  <defs>
    <linearGradient id="htt-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7B65" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#7B6B55" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5B4B35" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <g transform="translate(60,60)">
    <!-- HEAT repeat solenoid - arc of helical repeats -->
    <path d="M-30,-28 Q-40,-10 -34,10 Q-28,30 -10,36 Q10,42 28,30 Q38,20 36,0 Q34,-20 20,-32 Q6,-40 -10,-36 Q-22,-34 -30,-28Z" fill="url(#htt-g)" opacity="0.6"/>
    <!-- Inner cavity -->
    <path d="M-16,-16 Q-22,-2 -18,12 Q-14,24 -2,26 Q12,28 20,18 Q26,10 24,-4 Q22,-16 12,-22 Q2,-26 -8,-22 Q-14,-20 -16,-16Z" fill="#F5F0EB" opacity="0.4"/>
    <!-- HEAT repeat ridges -->
    <path d="M-32,-18 Q-20,-24 -14,-16" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M-36,2 Q-24,-4 -18,6" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M-30,20 Q-18,14 -10,22" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M-6,36 Q4,30 14,32" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M26,24 Q28,14 34,8" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
    <path d="M34,-6 Q28,-16 22,-24" stroke="#6B5B45" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  </g>
</svg>
