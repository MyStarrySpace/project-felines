<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- α-synuclein: twisted helix/ribbon suggesting fibril with Greek key motif -->
  <defs>
    <linearGradient id="asyn-g" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#7B6B55" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#5B4B35" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <g transform="translate(60,60)">
    <!-- Twisted ribbon fibril -->
    <path d="M-8,-40 Q12,-36 8,-24 Q4,-12 -12,-8 Q-28,-4 -12,8 Q4,20 8,28 Q12,36 -4,40" stroke="url(#asyn-g)" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    <path d="M4,-40 Q-12,-34 -6,-22 Q0,-10 16,-6 Q28,0 14,12 Q0,24 -4,32 Q-8,38 8,42" stroke="url(#asyn-g)" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
    <!-- Cross-rungs suggesting beta structure -->
    <line x1="-10" y1="-14" x2="10" y2="-16" stroke="#7B6B55" stroke-width="2" opacity="0.35"/>
    <line x1="-14" y1="2" x2="16" y2="0" stroke="#7B6B55" stroke-width="2" opacity="0.35"/>
    <line x1="-6" y1="18" x2="10" y2="20" stroke="#7B6B55" stroke-width="2" opacity="0.35"/>
  </g>
</svg>
