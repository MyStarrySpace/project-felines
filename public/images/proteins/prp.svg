<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- PrP: compact globular domain with 3 helices and small beta sheet -->
  <defs>
    <linearGradient id="prp-g" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#8B7B65" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#6B5B45" stop-opacity="0.4"/>
    </linearGradient>
  </defs>
  <g transform="translate(60,60)">
    <!-- Three alpha helices (the hallmark of PrP^C) -->
    <!-- Helix A -->
    <path d="M-24,-20 Q-28,-10 -22,0 Q-16,10 -20,20" stroke="url(#prp-g)" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
    <!-- Helix B (longest) -->
    <path d="M-4,-30 Q2,-16 -2,0 Q-6,16 0,32" stroke="url(#prp-g)" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- Helix C -->
    <path d="M20,-18 Q24,-6 20,8 Q16,22 22,30" stroke="url(#prp-g)" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
    <!-- Small beta sheet (two arrows) -->
    <path d="M-32,-30 L-16,-28" stroke="#7B6B55" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <path d="M-16,-22 L-32,-24" stroke="#7B6B55" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
    <!-- Connecting loops -->
    <path d="M-22,20 Q-12,28 0,32" stroke="#7B6B55" stroke-width="1.5" opacity="0.3" fill="none"/>
    <path d="M-24,-20 Q-18,-28 -4,-30" stroke="#7B6B55" stroke-width="1.5" opacity="0.3" fill="none"/>
    <path d="M-4,-30 Q10,-28 20,-18" stroke="#7B6B55" stroke-width="1.5" opacity="0.3" fill="none"/>
  </g>
</svg>
